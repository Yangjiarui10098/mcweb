<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="app-version" content="1.3">
    <title>我的世界下载器 V1.3</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
            position: relative;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: #000000;
            z-index: 1;
        }
        .container {
            text-align: center;
            z-index: 2;
            position: relative;
        }
        .logo {
            width: 150px;
            height: auto;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }
        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }
        .version {
            font-size: 24px;
            color: #4CAF50;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .description {
            font-size: 16px;
            color: #aaa;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        .btn {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
            position: relative;
            overflow: hidden;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(76, 175, 80, 0.4);
        }

        /* 弹窗遮罩 */
        .modal-mask {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 999;
            justify-content: center;
            align-items: center;
        }
        .modal-mask.active {
            display: flex;
        }
        .modal-box {
            background: #1e1e1e;
            border-radius: 12px;
            padding: 30px;
            width: 85%;
            max-width: 320px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.6);
        }
        .modal-box h2 {
            font-size: 22px;
            margin-bottom: 8px;
        }
        .modal-box p {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 25px;
        }
        .modal-btn {
            display: block;
            width: 100%;
            padding: 14px;
            margin-bottom: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .modal-btn.international {
            background: linear-gradient(135deg, #2196F3, #1976D2);
            color: white;
        }
        .modal-btn.netease {
            background: linear-gradient(135deg, #E91E63, #C2185B);
            color: white;
        }
        .modal-btn.cancel {
            background: #444;
            color: #ccc;
            margin-bottom: 0;
        }
        .modal-btn:hover {
            filter: brightness(1.1);
        }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div class="container">
        <img src="logo.png" alt="Minecraft Logo" class="logo" onerror="this.style.display='none'">
        <h1>我的世界下载器</h1>
        <div class="version">V1.3</div>
        <p class="description">选择你想要下载的游戏版本</p>
        <button class="btn" onclick="openSelectModal()">选择版本下载</button>
    </div>

    <!-- 选择弹窗 -->
    <div class="modal-mask" id="selectModal">
        <div class="modal-box">
            <h2>选择版本</h2>
            <p>请选择你要下载的 Minecraft 版本</p>
            <button class="modal-btn international" onclick="goInternational()">国际基岩版</button>
            <button class="modal-btn netease" onclick="goNetease()">网易版</button>
            <button class="modal-btn cancel" onclick="closeSelectModal()">取消</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script>
        particlesJS('particles-js', {
            particles: {
                number: { value: 80, density: { enable: true, value_area: 800 } },
                color: { value: "#ffffff" },
                shape: { type: "circle" },
                opacity: { value: 0.5 },
                size: { value: 3, random: true },
                line_linked: { enable: true, distance: 150, color: "#ffffff", opacity: 0.4, width: 1 },
                move: { enable: true, speed: 6, direction: "none", out_mode: "out" }
            },
            interactivity: {
                events: {
                    onhover: { enable: true, mode: "repulse" },
                    onclick: { enable: true, mode: "push" }
                }
            }
        });

        function openSelectModal() {
            document.getElementById('selectModal').classList.add('active');
        }
        function closeSelectModal() {
            document.getElementById('selectModal').classList.remove('active');
        }
        function goInternational() {
            // 国际基岩版官网
            window.open('https://www.minecraft.net/zh-hans/get-minecraft', '_blank');
            closeSelectModal();
        }
        function goNetease() {
            // 网易我的世界官网
            window.open('https://mc.163.com/', '_blank');
            closeSelectModal();
        }

        // 点击遮罩关闭
        document.getElementById('selectModal').addEventListener('click', function(e) {
            if (e.target === this) closeSelectModal();
        });
    </script>
</body>
</html>

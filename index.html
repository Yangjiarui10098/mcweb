<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="app-version" content="1.3">
    <title>我的世界下载器 V1.3</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #000;
            color: white;
            font-family: sans-serif;
            overflow: hidden; /* 防止粒子溢出产生滚动条 */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* 粒子画布 */
        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1; /* 确保在粒子上方 */
            background-color: rgba(30, 30, 30, 0.85); /* 半透明背景 */
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            text-align: center;
            backdrop-filter: blur(5px); /* 毛玻璃效果 */
        }

        img {
            max-width: 150px;
            margin-bottom: 20px;
            border-radius: 10px;
        }

        h1 {
            margin-bottom: 10px;
            font-size: 24px;
        }

        p {
            margin-bottom: 30px;
            color: #ccc;
        }

        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 15px 32px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            width: 80%;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

    <!-- 粒子特效容器 -->
    <div id="particles-js"></div>

    <div class="container">
        <img src="logo.png" alt="Logo" onerror="this.style.display='none'">
        
        <h1>我的世界下载器 V1.3</h1>
        <p>点击按钮检查更新。</p>
        
        <button onclick="checkForUpdate()">选择版本下载</button>
    </div>

    <!-- 粒子特效库 (这是你原来的核心库) -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    
    <script>
        // 初始化粒子效果 (这是你原来的配置，原封不动)
        particlesJS("particles-js", {
            particles: {
                number: { value: 80, density: { enable: true, value_area: 800 } },
                color: { value: "#ffffff" },
                shape: { type: "circle" },
                opacity: { value: 0.5, random: false },
                size: { value: 3, random: true },
                line_linked: {
                    enable: true,
                    distance: 150,
                    color: "#ffffff",
                    opacity: 0.4,
                    width: 1
                },
                move: {
                    enable: true,
                    speed: 6,
                    direction: "none",
                    random: false,
                    straight: false,
                    out_mode: "out",
                    bounce: false
                }
            },
            interactivity: {
                detect_on: "canvas",
                events: {
                    onhover: { enable: true, mode: "repulse" },
                    onclick: { enable: true, mode: "push" }
                }
            },
            retina_detect: true
        });

        // 版本检测逻辑 (修复后的)
        function checkForUpdate() {
            const localVersion = document.querySelector('meta[name="app-version"]').getAttribute('content');
            
            fetch('version.json?v=' + new Date().getTime())
                .then(response => {
                    if (!response.ok) throw new Error('Network Error');
                    return response.json();
                })
                .then(data => {
                    const latestVersion = data.version;
                    const description = data.description;

                    if (latestVersion && latestVersion !== localVersion) {
                        if (confirm(`检测到新版本 v${latestVersion}！\n\n更新内容：${description}\n\n是否立即刷新？`)) {
                            window.location.reload(true);
                        }
                    } else {
                        alert('当前已是最新版本 V1.3！');
                    }
                })
                .catch(error => {
                    console.error('Update check failed:', error);
                    alert('检查更新失败，请稍后再试。');
                });
        }
    </script>
</body>
</html>

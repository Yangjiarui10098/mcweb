<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 这里是你当前的版本号，下次更新记得改这里 -->
    <meta name="app-version" content="1.2">
    <title>我的世界下载器 V1.3</title>
    <style>
        /* 页面整体样式 */
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        /* Logo 容器样式 */
        .logo-container {
            margin-bottom: 20px;
        }

        .logo-container img {
            max-width: 120px; /* Logo 大小 */
            height: auto;
            border-radius: 10px;
        }

        /* 主标题 */
        h1 {
            margin: 0 0 10px 0;
            font-size: 24px;
        }

        /* 副标题/提示 */
        p {
            color: #aaa;
            margin-bottom: 30px;
        }

        /* 按钮样式 */
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 15px 32px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 4px 2px;
            cursor: pointer;
            border-radius: 5px;
            width: 80%;
            max-width: 300px;
        }

        /* 更新弹窗样式 */
        .modal {
            display: none; /* 默认隐藏 */
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.4);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: #fefefe;
            margin: auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
            max-width: 400px;
            border-radius: 10px;
            text-align: center;
            color: black;
        }

        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- Logo 区域 -->
    <div class="logo-container">
        <!-- 👇 确保你的仓库里有一张叫 logo.png 的图片 -->
        <img src="logo.png" alt="Logo">
    </div>

    <h1>我的世界下载器 V1.3</h1>
    欢迎使用！本次更新修复了版本检测逻辑。
    
    <!-- 下载按钮 -->
    <button onclick="checkUpdate()">选择版本下载</button>

    <!-- 更新提示弹窗 -->
    <div id="updateModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <p id="modalText">
            <button onclick="applyUpdate()" style="background:#2196F3;">确定</button>
            <button onclick="closeModal()" style="background:#f44336;">取消</button>
        </div>
    </div>

    <script>
        // 防止重复弹窗的锁
        let hasPrompted = false;

        document.addEventListener('DOMContentLoaded', function () {
            // 强制禁用缓存，确保每次都拉最新的 version.json
            const localVersion = document.querySelector('meta[name="app-version"]').getAttribute('content');
            
            // 请求版本信息
            fetch('https://yangjiarui10098.github.io/mcweb/version.json?v=' + new Date().getTime())
                .then(res => {
                    if (!res.ok) throw new Error('Network error');
                    return res.json();
                })
                .then(data => {
                    const latestVersion = data.version;
                    // 只有当版本不一致，且还没弹过窗时，才弹窗
                    if (latestVersion && latestVersion !== localVersion && !hasPrompted) {
                        hasPrompted = true; // 锁住
                        showUpdateModal(latestVersion, data.description);
                    }
                })
                .catch(err => console.log('No update or offline'));
        });

        function showUpdateModal(version, desc) {
            const modal = document.getElementById('updateModal');
            const content = document.getElementById('modalText');
            content.innerText = `检测到新版本 v${version}！
更新内容：${desc}
是否立即刷新以应用更新？`;
            modal.style.display = 'flex'; // 显示弹窗
        }

        function closeModal() {
            document.getElementById('updateModal').style.display = 'none';
        }

        function applyUpdate() {
            // 用户确认更新，强制刷新页面
            window.location.reload(true);
        }

        // 模拟检查更新的按钮功能
        function checkUpdate() {
            alert('当前已是最新版本 v1.3！
请尝试关闭 App 重新打开，或者等待后续更新。');
        }
    </script>
</body>
</html>

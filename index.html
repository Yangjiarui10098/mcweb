<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="app-version" content="1.3">
    <title>我的世界下载器 V1.3</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: #000; color: #fff; overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; }
        #particles-js { position: fixed; width: 100%; height: 100%; z-index: 0; }
        .container { position: relative; z-index: 1; text-align: center; background: rgba(30,30,30,0.85); padding: 40px; border-radius: 10px; backdrop-filter: blur(5px); }
        .logo { max-width: 150px; margin-bottom: 20px; border-radius: 10px; }
        h1 { margin-bottom: 10px; font-size: 24px; }
        .version { font-size: 20px; color: #4CAF50; margin-bottom: 20px; }
        p { margin-bottom: 30px; color: #ccc; }
        .btn { background: #4CAF50; color: white; border: none; padding: 15px 32px; font-size: 16px; cursor: pointer; border-radius: 5px; width: 80%; transition: 0.3s; }
        .btn:hover { background: #45a049; }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div class="container">
        <img src="logo.png" alt="Logo" class="logo" onerror="this.style.display='none'">
        <h1>我的世界下载器</h1>
        <div class="version">V1.3</div>
        <p>点击按钮检查更新。</p>
        <button class="btn" onclick="checkForUpdate()">选择版本下载</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script>
        particlesJS("particles-js", {
            particles: { number: { value: 80 }, color: { value: "#ffffff" }, shape: { type: "circle" }, opacity: { value: 0.5 }, size: { value: 3 }, line_linked: { enable: true, distance: 150, color: "#ffffff", opacity: 0.4 }, move: { enable: true, speed: 6 } },
            interactivity: { events: { onhover: { enable: true, mode: "repulse" }, onclick: { enable: true, mode: "push" } } }
        });

        function checkForUpdate() {
            const localVersion = document.querySelector('meta[name="app-version"]').getAttribute('content');
            fetch('version.json?v=' + new Date().getTime())
                .then(res => res.json())
                .then(data => {
                    if (data.version !== localVersion) {
                        if (confirm(`检测到新版本 v${data.version}！\n\n更新内容：${data.description}\n\n是否立即刷新？`)) {
                            window.location.reload(true);
                        }
                    } else {
                        alert('当前已是最新版本 V1.3！');
                    }
                })
                .catch(() => alert('检查更新失败，请稍后再试。'));
        }
    </script>
</body>
</html>

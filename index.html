<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 关键：加上这句防止缓存，确保每次都能拉到最新的 JS -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- 本地版本号标识 (以后你改代码时，记得把这里的 content 改成 "1.3"、"1.4" 等) -->
    <meta name="app-version" content="1.3">
    
    <title>我的世界下载器</title>
    <link rel="stylesheet" href="style.css"> <!-- 假设你有独立的 CSS 文件，如果没有请把样式写在 style 标签里 -->
    <style>
        /* 这里是你的原有样式，我不动它 */
        :root {
            --mc-green: #55FF55;
            --bg-color: #000;
            --text-color: #fff;
        }
        body {
            margin: 0;
            padding: 0;
            background: var(--bg-color);
            color: var(--text-color);
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        .logo {
            max-width: 150px;
            margin-bottom: 20px;
        }
        .btn-download {
            background: var(--mc-green);
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            margin-top: 20px;
        }
        footer {
            position: absolute;
            bottom: 10px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 你的 Logo 图 -->
        <img src="your-logo.png" alt="Logo" class="logo"> 
        
        <h1>我的世界下载器</h1>
        
        <button class="btn-download" onclick="checkUpdate()">
            选择版本下载
        </button>
    </div>

    <footer>
        © 2026 MC Web | 当前版本: <span id="currentVersion">1.2</span>
    </footer>

    <!-- 智能版本检测脚本 (V1.3 核心) -->
    <script>
        // 页面加载完成后执行检测
        document.addEventListener('DOMContentLoaded', function () {
            // 1. 读取本地版本号 (从 Meta 标签里读)
            const localVersionMeta = document.querySelector('meta[name="app-version"]');
            let localVersion = '1.2'; // 默认兜底版本
            if (localVersionMeta) {
                localVersion = localVersionMeta.getAttribute('content');
            }
            
            // 2. 显示当前版本号到底部
            document.getElementById('currentVersion').innerText = localVersion;

            // 3. 请求 GitHub 上的 version.json 文件
            // 加上时间戳防止浏览器缓存这个 json 文件
            fetch('https://yangjiarui10098.github.io/mcweb/version.json?v=' + new Date().getTime())
                .then(response => {
                    if (!response.ok) {
                        throw new Error('网络响应错误');
                    }
                    return response.json();
                })
                .then(data => {
                    const latestVersion = data.version;
                    console.log('本地版本:', localVersion, '云端版本:', latestVersion);

                    // 4. 比对版本号
                    if (latestVersion && latestVersion !== localVersion) {
                        // 5. 如果不一致，弹出确认框
                        const updateMsg = `检测到新版本 v${latestVersion}！\n\n更新内容：${data.description || '优化体验与修复问题'}\n\n是否立即刷新以应用更新？`;
                        
                        if (confirm(updateMsg)) {
                            // 用户点确定，强制刷新页面 (绕过缓存)
                            window.location.reload(true);
                        }
                    }
                })
                .catch(err => {
                    console.log('版本检测失败 (可能是没网):', err);
                });
        });

        // 你的原有按钮逻辑（示例）
        function checkUpdate() {
            // 这里放你原本的跳转逻辑，比如打开模态框或者跳转链接
            alert('正在加载版本列表...');
            // window.open('https://example.com', '_blank');
        }
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 这里对应你的 V1.3 版本 -->
    <meta name="app-version" content="1.3">
    <title>我的世界下载器 V1.3</title>
    <style>
        body { 
            background-color: #121212; 
            color: white; 
            font-family: sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            text-align: center; 
        }
        .container { 
            background-color: #1e1e1e; 
            padding: 40px; 
            border-radius: 10px; 
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        img {
            max-width: 150px; /* Logo最大宽度 */
            margin-bottom: 20px;
        }
        h1 { margin-bottom: 10px; font-size: 24px; }
        p { margin-bottom: 30px; color: #ccc; }
        button { 
            background-color: #4CAF50; 
            color: white; 
            border: none; 
            padding: 15px 32px; 
            font-size: 16px; 
            cursor: pointer; 
            border-radius: 5px; 
            width: 80%;
        }
        button:hover { background-color: #45a049; }
        
        /* 加载遮罩样式 */
        #loadingMask {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            color: white;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <!-- 加载中的遮罩 -->
    <div id="loadingMask">
        正在加载版本列表...
        <button onclick="hideLoading()" style="margin-top:20px; background:#555;">确定</button>
    </div>

    <div class="container">
        <!-- Logo 显示区域 -->
        <img id="appLogo" src="logo.png" alt="Logo">
        
        <h1>我的世界下载器 V1.3</h1>
        <p id="updateDesc">欢迎使用！正在检查更新...
        
        <button onclick="checkUpdate()">选择版本下载</button>
    </div>

    <script>
        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', function () {
            // 1. 显示Logo（如果加载失败则隐藏alt文本）
            const logo = document.getElementById('appLogo');
            logo.onerror = function() { this.style.display = 'none'; };
            
            // 2. 检查更新逻辑
            checkVersion();
        });

        function checkVersion() {
            const localVersion = document.querySelector('meta[name="app-version"]').getAttribute('content');
            
            // 模拟从服务器获取版本信息
            fetch('version.json?v=' + new Date().getTime())
                .then(res => res.json())
                .then(data => {
                    const latestVersion = data.version;
                    const desc = data.description;
                    
                    document.getElementById('updateDesc').innerText = `欢迎使用！${desc}`;
                    
                    // 如果版本不一致，提示更新
                    if (latestVersion && latestVersion !== localVersion) {
                        if(confirm(`检测到新版本 v${latestVersion}！
                        
更新内容：${desc}

是否立即刷新？`)) {
                            window.location.reload(true);
                        }
                    }
                })
                .catch(err => {
                    console.log('读取版本信息失败:', err);
                    document.getElementById('updateDesc').innerText = "欢迎使用！当前为最新版本。";
                })
                .finally(() => {
                    // 无论成功失败，都要关闭加载遮罩
                    hideLoading();
                });
        }

        function checkUpdate() {
            // 这里是你的下载逻辑
            alert('功能已修复！现在可以正常选择了。');
        }

        function hideLoading() {
            document.getElementById('loadingMask').style.display = 'none';
        }
    </script>
</body>
</html>
